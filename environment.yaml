name: promise
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.9

  # Data processing
  - numpy
  - pandas
  - scipy
  - scikit-learn
  
  # Command-line interface
  - click
  
  # Parallel processing
  - joblib
  - tqdm
  
  # Structural biology
  - biopython
  - gemmi
  
  # Validation and data models
  - pydantic
  
  # Visualization
  - matplotlib
  
  # Sequence alignment
  - parasail-python
  
  - foldseek
  - mmseqs2
  - famsa
  
  # PyTorch (for ESM) - install pytorch separately if needed:
  #   GPU: conda install pytorch pytorch-cuda=11.8 -c pytorch -c nvidia
  #   CPU: conda install pytorch cpuonly -c pytorch
  - pytorch>=1.12
  
  # Pip-only packages
  - pip
  - pip:
    - nurikit
    - fair-esm  # ESM-MSA-1b for contact prediction
