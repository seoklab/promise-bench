# ProMiSE-bench evaluation path configuration.
#
# All relative paths are resolved from the repo root.
# Modules reference these via:
#   from eval._config import eval_cfg as E
#   E.dir("training_bias")  -> Path("data_eval/train/training_bias")
#   E.file("valid_pairs")   -> Path("data_eval/valid_pairs.json")

eval:
  data_root: data_eval

  dirs:
    # train
    train: train
    training_bias: train/training_bias
    memorization_hits_foldseek: train/memorization_hits_foldseek
    memorization_hits_mmseqs: train/memorization_hits_mmseqs
    memorization_hits_intersection: train/memorization_hits_intersection

    # msa
    msa: msa

    # distogram
    distogram: distogram

    # output
    output: output

    # plot
    plots: plots
    filtered_pairs: filtered_pairs_msa_bias

  files:
    # core inputs
    valid_pairs: valid_pairs.json
    survived_clusters: survived_clusters_threshold60.json

    # confbench scores
    confbench_scores: confbench_scores_valid_pairs.json
    confbench_distogram: confbench_scores_distogram.json

    # msa preference
    msa_pref_csv: per_pair_summary.csv

    # merged outputs
    merged_json: merged_valid_pairs_data.json
    merged_csv: merged_valid_pairs_data.csv

    # training bias per-model outputs
    training_bias_af3: train/training_bias/training_bias_per_pair_af3.json
    training_bias_boltz2: train/training_bias/training_bias_per_pair_boltz_2.json
    training_bias_chai1: train/training_bias/training_bias_per_pair_chai_1.json
    training_bias_bioemu: train/training_bias/training_bias_per_pair_bioemu.json

  # External paths (machine-specific, override as needed)
  external:
    meta_data_dir: null       # e.g. /home.galaxy4/seeun/DB/RCSB/meta_data
    combinations_dir: null    # e.g. data/combinations-final
    foldseek_hits_dir: null   # e.g. /path/to/foldseek/out
    mmseqs_hits_dir: null     # e.g. /path/to/mmseqs/out
