# ProMiSE-bench curation pipeline path configuration.
#
# All paths are relative to the data root (default: "data/").
# The DataRootCommand `-C` option rebases "data/" to an alternate root.
#
# Modules reference these via:
#   from curation.utils._config import pipeline_cfg as C
#   C.dir("seqs")   -> Path("data/seqs")
#   C.file("filtered_pairs") -> Path("data/filtered-pairs.csv")

pipeline:
  data_root: data
  final_output: dataset-pipeline

  # Directories that are cleaned up unless --keep-intermediates
  intermediate:
    - asms_raw
    - asms_bio
    - asms_subset
    - asms_metal
    - combinations
    - combinations_filtered
    - seqcluster_work

  dirs:
    # Phase 1: MSA / TM-score / clustering
    seqs: seqs
    msas: msas
    coords: coords
    missing: missing
    scores: scores
    clusters: clusters

    # Phase 2: assembly curation
    cif_asms: cif-asms
    asms_raw: asms-raw
    asms_bio: asms-bio
    asms_subset: asms-subset
    asms_metal: asms-metal

    # Phase 3: pair extraction
    combinations: combinations
    combinations_filtered: combinations-filtered
    seqcluster_work: seqcluster_work
    dataset_pipeline: dataset-pipeline

    # Misc
    logs: logs

  files:
    filtered_pairs: filtered-pairs.csv
    high_tm: high-tm-pairs.csv
    pair_calls: pair-calls.csv
    representative_sequences: representative_sequences.json
    binding_site_compatibility: binding_site_compatibility.csv
    excluded_ccd_codes: excluded_ccd_codes.txt
    ligand_clusters: /home.galaxy4/seeun/works/projects/casp-pipe/data/cluster-lig_ccd/cutoff_0.4.json
